{% extends 'base.html' %}
{% block title %}Forgot Password - Prescription Scanner{% endblock %}
{% block content %}
<div class="auth-wrapper auth-wrapper-center">
    <div class="auth-card auth-card-narrow">
        <div class="text-center mb-4">
            <div class="auth-logo-icon mx-auto mb-3"><i class="bi bi-file-earmark-medical-fill"></i></div>
            <h2>Reset Password</h2>
            <p class="text-muted">Enter your registered email address. A reset link will be sent to your inbox.</p>
        </div>
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group-auth">
                <label class="form-label-auth">Email Address</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" class="form-control auth-input" name="email"
                           placeholder="your@email.com" required>
                </div>
            </div>
            <button type="submit" class="btn btn-auth-primary w-100 mt-2">
                <i class="bi bi-send me-2"></i>Send Reset Link
            </button>
        </form>
        <div class="auth-divider"><span>Remember your password?</span></div>
        <a href="{{ url_for('login') }}" class="btn btn-auth-secondary w-100">Back to Sign In</a>
    </div>
</div>
{% endblock %}
