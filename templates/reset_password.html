{% extends 'base.html' %}
{% block title %}Set New Password - Prescription Scanner{% endblock %}
{% block content %}
<div class="auth-wrapper auth-wrapper-center">
    <div class="auth-card auth-card-narrow">
        <div class="text-center mb-4">
            <div class="auth-logo-icon mx-auto mb-3"><i class="bi bi-shield-lock-fill"></i></div>
            <h2>Set New Password</h2>
            <p class="text-muted">Choose a strong password for your account.</p>
        </div>
        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="form-group-auth">
                <label class="form-label-auth">New Password</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" class="form-control auth-input" id="password" name="password"
                           placeholder="Minimum 8 characters" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <i class="bi bi-eye" id="eye-password"></i>
                    </button>
                </div>
            </div>
            <div class="form-group-auth">
                <label class="form-label-auth">Confirm New Password</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" class="form-control auth-input" id="confirm_password"
                           name="confirm_password" placeholder="Re-enter password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-auth-primary w-100 mt-2">
                <i class="bi bi-check-circle me-2"></i>Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
